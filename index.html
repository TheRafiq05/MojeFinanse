<!DOCTYPE html>
<html lang="pl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rentney - Czynsz pod kontrolą</title>
    
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10B981">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        rentney: { 
                            light: '#ECFDF5', 
                            50: '#ECFDF5',
                            100: '#D1FAE5',
                            200: '#A7F3D0',
                            400: '#34D399', 
                            500: '#10B981', 
                            600: '#059669', 
                            900: '#064E3B',
                            gradientStart: '#34D399', 
                            gradientEnd: '#0D9488' 
                        },
                        darkBg: '#121212', 
                        darkCard: '#1E1E1E'
                    },
                    animation: { 
                        'blob': 'blob 7s infinite', 
                        'fade-in': 'fadeIn 0.3s ease-out forwards' 
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: { 
                            '0%': { opacity: '0', transform: 'translateY(10px)' }, 
                            '100%': { opacity: '1', transform: 'translateY(0)' } 
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }

        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); }
        .dark .glass-card { background: rgba(30, 30, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }

        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass-nav { background: rgba(20, 20, 20, 0.85); border-top: 1px solid rgba(255, 255, 255, 0.05); }

        .input-wow { width: 100%; background: rgba(255, 255, 255, 0.8); border: 2px solid transparent; padding: 0.6rem 0.8rem; border-radius: 1rem; outline: none; transition: all 0.3s; color: #1f2937; font-weight: 500; font-size: 0.875rem; }
        .input-wow:focus { background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .dark .input-wow { background: rgba(0, 0, 0, 0.3); color: #f3f4f6; border-color: rgba(255,255,255,0.05); }
        .dark .input-wow:focus { background: rgba(0, 0, 0, 0.5); border-color: rgba(255,255,255,0.1); }

        .bg-dynamic-rentney { background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%); }
        .dark .bg-dynamic-rentney { background: linear-gradient(135deg, #022C22 0%, #064E3B 100%); }

        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        html { font-size: 15px; }

        /* Style ekranu ładowania */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ECFDF5; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .dark #splash-screen { background: #022C22; }
        #splash-screen.hide-splash { opacity: 0; pointer-events: none; }
        .splash-logo-container { width: 110px; height: 110px; border-radius: 28px; margin-bottom: 24px; box-shadow: 0 20px 40px -10px rgba(16, 185, 129, 0.5); animation: logo-breathe 3s ease-in-out infinite; overflow: hidden; display: flex; align-items: center; justify-content: center; background: transparent; }
        .splash-logo-container img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes logo-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #main-content-wrapper { opacity: 0; transition: opacity 0.5s ease-in; }
        #main-content-wrapper.content-visible { opacity: 1; }
    </style>
</head>
<body class="bg-dynamic-rentney text-slate-800 dark:text-slate-100 min-h-screen transition-all duration-700 relative" id="body-bg">

    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div id="blob1" class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-rentney-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob dark:opacity-20 transition-colors duration-700"></div>
        <div id="blob2" class="absolute top-[20%] right-[-10%] w-64 h-64 bg-teal-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000 dark:opacity-20 transition-colors duration-700"></div>
        <div id="blob3" class="absolute bottom-[-20%] left-[20%] w-80 h-80 bg-emerald-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000 dark:opacity-20 transition-colors duration-700"></div>
    </div>

    <!-- Pływający Header -->
    <header class="fixed top-[40px] sm:top-[50px] left-4 right-4 z-40 glass-card rounded-[1.5rem] px-5 py-3 flex justify-between items-center shadow-md max-w-md mx-auto">
        <h1 id="app-title" class="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-rentney-gradientStart to-rentney-gradientEnd transition-all duration-500">
            Rentney
        </h1>
        <div class="flex items-center gap-2">
            <button onclick="openSettingsModal()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-white/10 flex items-center justify-center active:scale-90 transition-transform shadow-sm">
                <i class="ph-fill ph-gear text-lg text-slate-600 dark:text-slate-300"></i>
            </button>
            <button onclick="toggleTheme()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-white/10 flex items-center justify-center active:scale-90 transition-transform shadow-sm">
                <i class="ph-fill ph-moon text-lg dark:hidden text-slate-700"></i>
                <i class="ph-fill ph-sun text-lg hidden dark:block text-yellow-400"></i>
            </button>
        </div>
    </header>

    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="icon-512.png" alt="Rentney Logo" onerror="this.onerror=null; this.src='https://placehold.co/512x512/10B981/ffffff?text=R'">
        </div>
        <h1 class="text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight mb-2">Rentney</h1>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Czynsz pod kontrolą</p>
    </div>

    <div id="toast" class="fixed top-36 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800 text-white px-5 py-2.5 rounded-full text-sm font-semibold shadow-xl opacity-0 pointer-events-none transition-opacity duration-300">
        Komunikat
    </div>

    <div id="main-content-wrapper">
        <main class="px-4 max-w-md mx-auto min-h-screen relative z-10" style="padding-top: 115px; padding-bottom: 40px;">
            
            <div id="view-rent" class="space-y-4">
                
                <div class="glass-card rounded-[1.5rem] p-5 text-center shadow-lg relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-br from-rentney-gradientStart to-rentney-gradientEnd opacity-10 group-hover:opacity-20 transition-opacity"></div>
                    <div class="relative z-10">
                        <div class="w-10 h-10 mx-auto bg-rentney-100 dark:bg-rentney-900/40 rounded-full flex items-center justify-center mb-2">
                            <i class="ph-fill ph-house-line text-xl text-rentney-500"></i>
                        </div>
                        <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-0.5 uppercase tracking-wider">Baza czynszu</p>
                        <h2 class="text-4xl font-black text-slate-800 dark:text-white tracking-tight" id="total-rent-display">0 <span class="text-xl text-slate-400">zł</span></h2>
                        <div class="mt-2 inline-block bg-rentney-100 dark:bg-rentney-900/30 px-3 py-1 rounded-full">
                            <p class="text-[11px] font-bold text-rentney-600 dark:text-rentney-400">≈ <span id="per-person-display">0</span> zł / osobę</p>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-[1.5rem] p-1.5 shadow-sm border border-rentney-200 dark:border-white/5">
                    <div class="p-3 flex justify-between items-center cursor-pointer" onclick="toggleSettings()">
                        <div class="flex items-center gap-2">
                            <div class="p-2 bg-rentney-100 dark:bg-rentney-900/30 rounded-xl text-rentney-500">
                                <i class="ph-fill ph-sliders-horizontal text-lg"></i>
                            </div>
                            <h2 class="font-bold text-base">Parametry wynajmu</h2>
                        </div>
                        <i id="settings-icon" class="ph-bold ph-caret-down text-lg text-slate-400 transition-transform duration-300 mr-2"></i>
                    </div>
                    
                    <div id="settings-content" class="hidden px-3 pb-3 space-y-4">
                        <div class="w-full h-px bg-slate-200 dark:bg-white/10 mb-2"></div>
                        
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 block flex items-center gap-1"><i class="ph-fill ph-coins"></i> Kwoty stałe</label>
                            <div class="space-y-2">
                                <div class="relative focus-within:text-rentney-500 text-slate-400 transition-colors">
                                    <i class="ph-fill ph-key absolute left-3 top-1/2 transform -translate-y-1/2 text-base"></i>
                                    <input type="number" id="base-rent" placeholder="Odstępne" class="input-wow pl-9 border-rentney-100 focus:border-rentney-500" oninput="calculateRent()">
                                </div>
                                <div class="relative focus-within:text-rentney-500 text-slate-400 transition-colors">
                                    <i class="ph-fill ph-buildings absolute left-3 top-1/2 transform -translate-y-1/2 text-base"></i>
                                    <input type="number" id="base-admin" placeholder="Czynsz adm." class="input-wow pl-9 border-rentney-100 focus:border-rentney-500" oninput="calculateRent()">
                                </div>
                                <div class="relative focus-within:text-rentney-500 text-slate-400 transition-colors">
                                    <i class="ph-fill ph-lightning absolute left-3 top-1/2 transform -translate-y-1/2 text-base"></i>
                                    <input type="number" id="base-electric" placeholder="Zaliczki (prąd, gaz)" class="input-wow pl-9 border-rentney-100 focus:border-rentney-500" oninput="calculateRent()">
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 block flex items-center gap-1"><i class="ph-fill ph-calendar-blank"></i> Start umowy</label>
                            <div id="start-month-chips" class="grid grid-cols-4 gap-1.5"></div>
                            <input type="hidden" id="start-month" value="0">
                        </div>

                        <div class="pt-1">
                            <div class="flex justify-between items-center mb-1.5">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1"><i class="ph-fill ph-users"></i> Lokatorzy</label>
                                <span class="bg-slate-200 dark:bg-slate-700 text-[10px] px-2 py-0.5 rounded-full font-bold" id="tenant-count">0</span>
                            </div>
                            <div class="flex gap-1.5 mb-2">
                                <input type="text" id="new-tenant-name" placeholder="Imię (np. Ania)" class="input-wow border-rentney-100 focus:border-rentney-500">
                                <button onclick="addTenant()" class="bg-rentney-500 hover:bg-rentney-600 text-white w-12 rounded-xl flex items-center justify-center font-bold active:scale-90 transition-all shadow-md shadow-rentney-500/30">
                                    <i class="ph-bold ph-plus text-lg"></i>
                                </button>
                            </div>
                            <div id="tenants-list" class="flex flex-wrap gap-1.5"></div>
                        </div>

                        <button onclick="toggleSettings()" class="w-full mt-2 bg-slate-800 dark:bg-white text-white dark:text-slate-900 py-3 rounded-xl text-sm font-bold shadow-md active:scale-95 transition-all flex justify-center items-center gap-2">
                            <i class="ph-bold ph-check"></i> Gotowe, schowaj
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between mb-1 mt-6 px-1">
                    <h3 class="font-extrabold text-lg">Miesiące</h3>
                    <button class="bg-gradient-to-r from-rentney-gradientStart to-rentney-gradientEnd text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-md shadow-rentney-500/30 active:scale-95 transition-transform flex items-center gap-1" onclick="generateMonths()">
                        <i class="ph-bold ph-magic-wand"></i> Generuj
                    </button>
                </div>
                
                <div id="months-container" class="space-y-3">
                    <div class="text-center py-8 glass-card rounded-[1.5rem]">
                        <div class="w-12 h-12 bg-slate-100 dark:bg-white/5 rounded-full flex items-center justify-center mx-auto mb-2">
                            <i class="ph-fill ph-calendar-plus text-2xl text-slate-400"></i>
                        </div>
                        <p class="text-xs font-semibold text-slate-500">Brak miesięcy.<br>Ustaw dane i kliknij "Generuj".</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: Ustawienia -->
    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex-col justify-end">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity opacity-0" id="settings-backdrop" onclick="closeSettingsModal()"></div>
        <div class="relative w-full max-w-md mx-auto bg-white dark:bg-darkCard rounded-t-[1.5rem] p-5 pb-[calc(env(safe-area-inset-bottom)+1rem)] transform transition-transform translate-y-full shadow-2xl" id="settings-panel">
            <button onclick="closeSettingsModal()" class="absolute top-5 right-5 w-7 h-7 bg-slate-100 dark:bg-white/10 rounded-full flex items-center justify-center text-slate-500 active:scale-90 transition-transform">
                <i class="ph-bold ph-x text-sm"></i>
            </button>
            <div class="w-10 h-1 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-5"></div>
            <h3 class="text-xl font-black mb-5 flex items-center gap-2 text-slate-800 dark:text-white"><i class="ph-fill ph-gear text-slate-500"></i> Ustawienia</h3>
            
            <div class="space-y-3">
                <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 leading-relaxed">Kopia zapasowa danych do pliku. Aplikacja zapisuje się automatycznie (LocalStorage).</p>
                <div class="relative focus-within:text-rentney-500 text-slate-400 transition-colors">
                    <i class="ph-fill ph-file-text absolute left-3 top-1/2 transform -translate-y-1/2 text-base"></i>
                    <input type="text" id="export-filename" placeholder="Nazwa pliku" class="input-wow pl-9 focus:border-slate-500 border-slate-200 w-full" value="rentney_backup">
                </div>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="handleFileUpload(event)">
                
                <div class="flex gap-2.5 mt-1">
                    <button onclick="exportDataFile()" class="w-1/2 bg-slate-100 dark:bg-white/10 text-slate-700 dark:text-white py-2.5 rounded-xl font-bold text-sm active:scale-95 transition-transform flex justify-center items-center gap-1.5">
                        <i class="ph-bold ph-export"></i> Zapisz
                    </button>
                    <button onclick="document.getElementById('import-file').click()" class="w-1/2 bg-slate-800 dark:bg-white text-white dark:text-slate-900 py-2.5 rounded-xl font-bold text-sm active:scale-95 transition-transform flex justify-center items-center gap-1.5 shadow-md">
                        <i class="ph-bold ph-download-simple"></i> Wczytaj
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
    const STORAGE_KEY = 'rentneyAutoSaveData';

    function getAppStateData() {
        const data = {
            tenants,
            baseRent: document.getElementById('base-rent').value,
            baseAdmin: document.getElementById('base-admin').value,
            baseElectric: document.getElementById('base-electric').value,
            startMonth: document.getElementById('start-month').value,
            monthsData: []
        };
        for(let i=0; i<12; i++) {
            if(document.getElementById(`month-card-${i}`)) {
                let month = { 
                    id: i, 
                    invoice: document.getElementById(`invoice-${i}`).value, 
                    done: document.getElementById(`check-${i}`).classList.contains('bg-green-500'),
                    payments: [] 
                };
                tenants.forEach((_, tIndex) => {
                    const paidEl = document.getElementById(`paid-${i}-${tIndex}`);
                    month.payments.push(paidEl ? paidEl.value : "");
                });
                data.monthsData.push(month);
            }
        }
        return data;
    }

    function saveToLocal() {
        try {
            const data = getAppStateData();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch(e) {
            console.error("Błąd autozapisu", e);
        }
    }

    function loadFromLocal() {
        try {
            const str = localStorage.getItem(STORAGE_KEY);
            if(str) {
                applyLoadedData(JSON.parse(str));
            } else {
                renderStartMonths();
            }
        } catch(e) {
            renderStartMonths();
        }
    }

    function applyLoadedData(data) {
        tenants = data.tenants || [];
        
        document.getElementById('base-rent').value = data.baseRent || '';
        document.getElementById('base-admin').value = data.baseAdmin || '';
        document.getElementById('base-electric').value = data.baseElectric || '';
        document.getElementById('start-month').value = data.startMonth || '0';
        
        renderStartMonths();
        calculateRent(false);
        renderTenants();
        
        if (data.monthsData && data.monthsData.length > 0) {
            generateMonths(false);
            data.monthsData.forEach(m => {
                const invEl = document.getElementById(`invoice-${m.id}`);
                if(invEl) invEl.value = m.invoice;
                updateInvoice(m.id, false);
                
                m.payments.forEach((p, tIndex) => {
                    const paidEl = document.getElementById(`paid-${m.id}-${tIndex}`);
                    if (paidEl) {
                        paidEl.value = p;
                        calcTenant(m.id, tIndex, false);
                    }
                });
                
                if (m.done) {
                    const check = document.getElementById(`check-${m.id}`);
                    if(check && !check.classList.contains('bg-green-500')) {
                        toggleMonthDone(m.id, null, false);
                    }
                }
            });
        }
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.classList.remove('opacity-0');
        toast.classList.add('opacity-100');
        setTimeout(() => {
            toast.classList.remove('opacity-100');
            toast.classList.add('opacity-0');
        }, 3000);
    }

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        saveToLocal(); // Zapis jest wywoływany w innych momentach, tutaj czysto informacyjnie
    }

    let tenants = [];
    let totalBaseRent = 0;

    function toggleSettings() {
        const content = document.getElementById('settings-content');
        const icon = document.getElementById('settings-icon');
        if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            icon.style.transform = 'rotate(180deg)';
        } else {
            content.classList.add('hidden');
            icon.style.transform = 'rotate(0deg)';
        }
    }

    function calculateRent(autoSave = true) {
        const r = parseFloat(document.getElementById('base-rent').value.replace(',','.')) || 0;
        const a = parseFloat(document.getElementById('base-admin').value.replace(',','.')) || 0;
        const e = parseFloat(document.getElementById('base-electric').value.replace(',','.')) || 0;
        
        totalBaseRent = r + a + e;
        document.getElementById('total-rent-display').innerHTML = totalBaseRent.toFixed(0) + ' <span class="text-xl text-slate-400 dark:text-slate-500">zł</span>';
        updatePerPerson();
        if(autoSave) saveToLocal();
    }

    function updatePerPerson() {
        const count = tenants.length || 1;
        const perPerson = Math.round(totalBaseRent / count);
        document.getElementById('per-person-display').innerText = perPerson.toFixed(0);
        document.getElementById('tenant-count').innerText = tenants.length;
    }

    function addTenant() {
        const nameInput = document.getElementById('new-tenant-name');
        const name = nameInput.value.trim();
        if (name) {
            tenants.push(name);
            nameInput.value = '';
            renderTenants();
            updatePerPerson();
            saveToLocal();
        } else {
            showToast("Wpisz imię lokatora!");
        }
    }

    function removeTenant(index) {
        tenants.splice(index, 1);
        renderTenants();
        updatePerPerson();
        saveToLocal();
    }

    function renderTenants() {
        const container = document.getElementById('tenants-list');
        container.innerHTML = '';
        tenants.forEach((t, i) => {
            container.innerHTML += `
            <div class="bg-white dark:bg-black/40 border border-slate-200 dark:border-white/10 px-2.5 py-1 rounded-lg flex items-center gap-1.5 shadow-sm text-xs font-bold animate-fade-in">
                ${t} <i class="ph-bold ph-x text-slate-400 cursor-pointer hover:text-red-500 ml-0.5" onclick="removeTenant(${i})"></i>
            </div>`;
        });
    }

    const monthNames = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
    const shortMonthNames = ["Sty", "Lut", "Mar", "Kwi", "Maj", "Cze", "Lip", "Sie", "Wrz", "Paź", "Lis", "Gru"];

    function renderStartMonths() {
        const container = document.getElementById('start-month-chips');
        const currentSelected = parseInt(document.getElementById('start-month').value) || 0;
        
        container.innerHTML = shortMonthNames.map((m, index) => `
            <button type="button" onclick="selectStartMonth(${index})" class="px-1.5 py-1.5 rounded-lg text-[10px] font-bold border transition-all flex flex-col items-center justify-center gap-0.5 active:scale-90 ${index === currentSelected ? 'bg-rentney-500 text-white border-rentney-500 shadow-md shadow-rentney-500/30' : 'bg-transparent text-slate-500 border-slate-200 dark:border-white/10 dark:text-slate-400'}">
                <i class="ph-fill ph-calendar-blank text-base"></i>
                <span>${m}</span>
            </button>
        `).join('');
    }

    function selectStartMonth(index) {
        document.getElementById('start-month').value = index;
        renderStartMonths();
        saveToLocal();
    }

    function generateMonths(autoSave = true) {
        if (tenants.length === 0) {
            showToast("Dodaj przynajmniej jedną osobę!");
            const content = document.getElementById('settings-content');
            if (content.classList.contains('hidden')) toggleSettings();
            return;
        }
        const container = document.getElementById('months-container');
        container.innerHTML = '';
        
        const startMonthIndex = parseInt(document.getElementById('start-month').value) || 0;
        
        for(let i=0; i<12; i++) {
            let mIndex = (startMonthIndex + i) % 12;
            renderMonthCard(container, monthNames[mIndex], i);
        }
        if(autoSave) {
            showToast("Utworzono harmonogram!");
            saveToLocal();
        }
    }

    function renderMonthCard(container, monthName, id) {
        const tenantHTML = tenants.map((t, index) => `
            <div class="flex items-center justify-between py-2 border-b border-slate-100 dark:border-white/5 last:border-0">
                <div class="w-[30%] pr-1">
                    <p class="font-extrabold text-[13px] truncate">${t}</p>
                    <p class="text-[9px] text-slate-500 uppercase tracking-wide font-bold mt-0.5">Do zapłaty:</p>
                    <p class="text-[15px] font-black text-rentney-600 dark:text-rentney-400 leading-none mt-0.5"><span id="req-${id}-${index}">0</span><span class="text-[10px] text-slate-400 ml-0.5">zł</span></p>
                </div>
                <div class="w-[45%] px-1">
                    <div class="relative flex items-center bg-white dark:bg-black/40 border border-transparent focus-within:border-rentney-400 rounded-lg overflow-hidden transition-colors shadow-sm">
                        <input type="number" id="paid-${id}-${index}" placeholder="Wpłata" class="w-full bg-transparent py-1.5 px-2 text-sm text-center outline-none font-bold" oninput="calcTenant(${id}, ${index})">
                    </div>
                </div>
                <div class="w-[25%] text-right flex flex-col items-end justify-center">
                    <span id="status-${id}-${index}" class="text-[10px] font-bold text-slate-400 bg-slate-100 dark:bg-white/5 px-2 py-0.5 rounded-md">Brak</span>
                </div>
            </div>
        `).join('');

        const card = `
            <div class="glass-card rounded-[1.5rem] p-4 transition-all duration-300 transform origin-top animate-fade-in" id="month-card-${id}">
                <div class="flex justify-between items-center mb-3 pb-3 border-b border-slate-200 dark:border-white/10">
                    <div class="flex items-center gap-2 cursor-pointer flex-1 min-w-0" onclick="toggleMonthCollapse(${id})">
                        <button onclick="toggleMonthDone(${id}, event)" id="check-${id}" class="w-6 h-6 shrink-0 rounded-full bg-slate-100 dark:bg-white/10 flex items-center justify-center text-slate-300 dark:text-slate-600 transition-all hover:scale-105 active:scale-95 shadow-inner">
                            <i class="ph-bold ph-check text-sm"></i>
                        </button>
                        <h3 class="font-black text-base flex items-center gap-1.5 truncate">
                            ${monthName} <i id="month-caret-${id}" class="ph-bold ph-caret-down text-xs text-slate-400 transition-transform shrink-0" style="transform: rotate(180deg);"></i>
                        </h3>
                    </div>
                    <div class="text-right shrink-0 ml-2">
                        <div class="relative flex items-center bg-white dark:bg-black/40 border border-rentney-100 dark:border-white/10 focus-within:border-rentney-500 rounded-lg overflow-hidden shadow-sm px-1.5 py-1">
                            <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mr-1 hidden sm:inline-block">Faktura:</span>
                            <input type="number" id="invoice-${id}" value="${totalBaseRent.toFixed(0)}" class="w-[3.5rem] bg-transparent text-right font-black text-xs outline-none" oninput="updateInvoice(${id})">
                            <span class="text-[9px] text-slate-500 font-bold ml-0.5">zł</span>
                        </div>
                    </div>
                </div>
                <div id="month-body-${id}" class="transition-all duration-300 origin-top overflow-hidden opacity-0 mt-0" style="max-height: 0px;">
                    ${tenantHTML}
                </div>
            </div>
        `;
        container.innerHTML += card;
        updateInvoice(id, false);
    }

    function updateInvoice(monthId, autoSave = true) {
        const invoiceInput = document.getElementById(`invoice-${monthId}`);
        if(!invoiceInput) return;
        const val = invoiceInput.value.replace(',','.');
        const invoiceAmount = parseFloat(val) || 0;
        
        let perPerson = 0;
        if(tenants.length > 0) perPerson = Math.round(invoiceAmount / tenants.length);

        tenants.forEach((_, index) => {
            const reqEl = document.getElementById(`req-${monthId}-${index}`);
            if(reqEl) reqEl.textContent = perPerson.toFixed(0);
            calcTenant(monthId, index, false); 
        });
        
        if(autoSave) saveToLocal();
    }

    function calcTenant(monthId, tIndex, autoSave = true) {
        const reqEl = document.getElementById(`req-${monthId}-${tIndex}`);
        if (!reqEl) return;
        
        const req = parseFloat(reqEl.textContent) || 0;
        const paidInputStr = document.getElementById(`paid-${monthId}-${tIndex}`).value.replace(',','.');
        const paid = parseFloat(paidInputStr) || 0;
        const statusEl = document.getElementById(`status-${monthId}-${tIndex}`);

        if (paidInputStr.trim() === "" || isNaN(paid)) {
            statusEl.innerHTML = `Brak`;
            statusEl.className = "text-[10px] font-bold text-slate-400 bg-slate-100 dark:bg-white/5 px-2 py-0.5 rounded-md inline-block";
        } else if (Math.abs(req - paid) < 0.05) { 
            statusEl.innerHTML = `<i class="ph-fill ph-check-circle text-sm"></i> OK`;
            statusEl.className = "text-[11px] font-black text-green-500 flex items-center justify-end gap-1";
        } else if (paid < req) {
            const diff = (req - paid).toFixed(0);
            statusEl.innerHTML = `<i class="ph-bold ph-warning-circle text-xs"></i> -${diff}`;
            statusEl.className = "text-[11px] font-black text-red-500 bg-red-50 dark:bg-red-500/10 px-1.5 py-0.5 rounded-md flex items-center justify-end gap-0.5";
        } else {
            const diff = (paid - req).toFixed(0);
            statusEl.innerHTML = `<i class="ph-bold ph-arrow-u-up-left text-xs"></i> +${diff}`;
            statusEl.className = "text-[11px] font-black text-green-600 bg-green-50 dark:bg-green-500/10 px-1.5 py-0.5 rounded-md flex items-center justify-end gap-0.5";
        }
        
        if(autoSave) saveToLocal();
    }

    function toggleMonthCollapse(monthId) {
        const body = document.getElementById(`month-body-${monthId}`);
        const caret = document.getElementById(`month-caret-${monthId}`);
        if(!body) return;
        
        if(body.style.maxHeight === '0px' || body.classList.contains('opacity-0')) {
            body.style.maxHeight = '1000px';
            body.classList.remove('opacity-0', 'mt-0');
            body.classList.add('opacity-100', 'mt-1');
            caret.style.transform = 'rotate(0deg)';
        } else {
            body.style.maxHeight = '0px';
            body.classList.add('opacity-0', 'mt-0');
            body.classList.remove('opacity-100', 'mt-1');
            caret.style.transform = 'rotate(180deg)';
        }
    }

    function toggleMonthDone(monthId, event, autoSave = true) {
        if(event) event.stopPropagation();
        const card = document.getElementById(`month-card-${monthId}`);
        const body = document.getElementById(`month-body-${monthId}`);
        const check = document.getElementById(`check-${monthId}`);
        const caret = document.getElementById(`month-caret-${monthId}`);

        if(check.classList.contains('bg-green-500')) {
            body.style.maxHeight = '1000px';
            body.classList.remove('opacity-0', 'mt-0');
            body.classList.add('opacity-100', 'mt-1');
            caret.style.transform = 'rotate(0deg)';
            
            card.classList.remove('opacity-60', 'bg-slate-50/50', 'dark:bg-black/20');
            check.classList.remove('bg-green-500', 'text-white', 'shadow-green-500/50');
            check.classList.add('bg-slate-100', 'dark:bg-white/10', 'text-slate-300', 'dark:text-slate-600');
        } else {
            body.style.maxHeight = '0px';
            body.classList.add('opacity-0', 'mt-0');
            body.classList.remove('opacity-100', 'mt-1');
            caret.style.transform = 'rotate(180deg)';
            
            card.classList.add('opacity-60', 'bg-slate-50/50', 'dark:bg-black/20');
            check.classList.add('bg-green-500', 'text-white', 'shadow-green-500/50');
            check.classList.remove('bg-slate-100', 'dark:bg-white/10', 'text-slate-300', 'dark:text-slate-600');
        }
        if(autoSave) saveToLocal();
    }

    function openSettingsModal() {
        const modal = document.getElementById('settings-modal');
        const panel = document.getElementById('settings-panel');
        const backdrop = document.getElementById('settings-backdrop');
        modal.classList.remove('hidden'); modal.classList.add('flex');
        setTimeout(() => { backdrop.classList.replace('opacity-0', 'opacity-100'); panel.classList.remove('translate-y-full'); }, 10);
    }

    function closeSettingsModal() {
        const modal = document.getElementById('settings-modal');
        const panel = document.getElementById('settings-panel');
        const backdrop = document.getElementById('settings-backdrop');
        panel.classList.add('translate-y-full'); backdrop.classList.replace('opacity-100', 'opacity-0');
        setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
    }

    function exportDataFile() {
        const dataStr = JSON.stringify(getAppStateData());
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        let filename = document.getElementById('export-filename').value.trim() || "rentney_backup";
        if (!filename.endsWith('.json')) filename += ".json";
        
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        
        closeSettingsModal();
        showToast("Plik pobrany!");
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                applyLoadedData(data);
                saveToLocal();
                closeSettingsModal();
                showToast("Dane wczytane!");
            } catch(error) {
                showToast("Błąd! Nieprawidłowy plik.");
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    function init() {
        // Logika splash screen - dodane zabezpieczenia
        const hideSplash = () => {
            const splash = document.getElementById('splash-screen');
            const wrapper = document.getElementById('main-content-wrapper');
            if(splash && !splash.classList.contains('hide-splash')) {
                splash.classList.add('hide-splash');
                if(wrapper) wrapper.classList.add('content-visible');
                setTimeout(() => { if(splash.parentNode) splash.parentNode.removeChild(splash); }, 600);
            }
        };

        setTimeout(hideSplash, 1000);
        
        // Zabezpieczenie: wymuś ukrycie po max 3 sekundach, gdyby podgląd działał wolniej
        setTimeout(hideSplash, 3000);

        loadFromLocal();
    }

    // Bezpieczniejsze odpalanie inicjalizacji (lepiej działa w oknach Preview)
    if (document.readyState === 'complete') {
        init();
    } else {
        window.addEventListener('load', init);
        document.addEventListener('DOMContentLoaded', init);
    }

</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(registration => { console.log('SW OK'); })
                .catch(err => { console.log('SW Error: ', err); });
        });
    }
</script>
